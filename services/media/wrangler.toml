name = "studio-media"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

account_id = "52ca2b395242b86653a1b8f5ae5bf222"

[vars]
CF_ACCESS_TEAM_DOMAIN = "vizchitra.cloudflareaccess.com"
CF_ACCESS_AUD = "2ea67a70024599c1476187b5eef943bd102f101c6416f2509e7c503bc429129c"

[[d1_databases]]
binding = "DB"
database_name = "studio"
database_id = "5755274a-7116-4182-ac3a-0935756b1580"
migrations_dir = "../../migrations"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "studio-media"

[[queues.consumers]]
queue = "studio-media-processing"
max_batch_size = 10
max_retries = 5

[[queues.producers]]
binding = "MEDIA_QUEUE"
queue = "studio-media-processing"
