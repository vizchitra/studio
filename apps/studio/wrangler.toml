name = "studio"
main = ".svelte-kit/cloudflare/_worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "studio"
database_id = "5755274a-7116-4182-ac3a-0935756b1580"
migrations_dir = "../../migrations"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "studio-media"

[[queues.producers]]
binding = "MEDIA_QUEUE"
queue = "studio-media-processing"

[[routes]]
pattern = "studio.vizchitra.com/*"
zone_name = "vizchitra.com"

# Cloudflare Access gates this route at the edge (Google as the login
# provider behind Access — see architecture/Studio Architecture RFC v1.md,
# Deployment section). Configure the Access application in the Zero Trust
# dashboard; it is not expressed in this file. See SETUP.md.
