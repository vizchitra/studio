name: PR Preview

# Uploads a Cloudflare Workers preview version (not a live deploy) and
# comments its URL on the PR. Note: this previews code changes only — if
# the PR also adds a migration, the remote D1 schema won't have it yet
# (migrations apply on merge to main, see deploy.yml), so schema-changing
# PRs won't fully preview until after merge.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run build --workspace=apps/studio

      - name: Upload preview version
        id: preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/studio
          command: versions upload
          wranglerVersion: "4.110.0"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = `${{ steps.preview.outputs.deployment-url }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview deployed: ${url}\n\nAccess-gated the same as production — sign in with your VizChitra Google account to view it.`
            });
