name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Validate migrations apply cleanly
        run: |
          set -e
          rm -f /tmp/ci-check.db
          for f in migrations/*.sql; do
            echo "Applying $f"
            sqlite3 /tmp/ci-check.db < "$f"
          done
